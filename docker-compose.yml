services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  pawtrace-backend:
    build: ./pawtrace-backend
    ports:
      - "5000:5000"
    env_file:
      - ./pawtrace-backend/.env
    environment:
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
      - OLLAMA_URL=http://ollama:11434
    restart: unless-stopped
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  pawtrace-web:
    build: ./pawtrace-web
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://pawtrace-backend:5000
    depends_on:
      pawtrace-backend:
        condition: service_healthy

volumes:
  ollama_data:
